services:
  - type: web
    name: spiko-bot
    runtime: docker
    repo: https://github.com/sardor-hyphen/spiko-bot
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "10000"
    # Health check configuration - using lite version to avoid timeouts
    healthCheck:
      path: /health-lite
      intervalSeconds: 30
      timeoutSeconds: 5
      unhealthyThreshold: 3
      healthyThreshold: 2
    # Enable automatic restarts on failure
    restartPolicy: on-failure
    # Add cron job for health check (if needed)
    # cron:
    #   - command: "curl -f https://$RENDER_EXTERNAL_URL/health || exit 1"
    #     schedule: "*/5 * * * *"
    env:
      NODE_ENV: production
